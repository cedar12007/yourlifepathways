{% extends "base.html" %}

{% block content %}
<section id="error" class="main special">
    <div class="content">
        <header class="major" style="margin-top:20px">
            <h1>404 - Page Not Found</h1>
            <p>Oops! It looks like the page you're looking for cannot be found.</p>
        </header>
        <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>
        <footer class="major">
            <ul class="actions special">
                <li><a href="{{ url_for('main.index') }}" class="button primary">Return to Home</a></li>
            </ul>
        </footer>
    </div>
</section>
{% endblock %}
