{% extends "base.html" %}

{% block extra_head_elements %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.min.css') }}">
{% endblock %}

{% block content %}
<section class="main">
    <a href="{{ url_for('admin.dashboard') }}" class="admin-back-link">
        <i class="fa-solid fa-arrow-left"></i> Back to Admin
    </a>
    <header class="major">
        <h2>Security: Change Gateway Password</h2>
    </header>

    <div class="admin-tabs">
        <a href="{{ url_for('admin.dashboard') }}" class="admin-tab">Blog Posts</a>
        <a href="{{ url_for('admin.manage_comments') }}" class="admin-tab">Comments</a>
        <a href="{{ url_for('admin.manage_likes') }}" class="admin-tab">Likes</a>
        <a href="{{ url_for('admin.security_logs') }}" class="admin-tab">Logs</a>
        <a href="{{ url_for('admin.change_password') }}" class="admin-tab active">Password</a>
        <a href="{{ url_for('admin.database_resilience') }}" class="admin-tab">Resilience</a>
    </div>

    <div class="admin-form-container" style="max-width: 500px; margin: 4em auto;">
        <form method="POST">
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password" required>
            </div>

            <hr style="margin: 2em 0;">

            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" minlength="8" required>
                <small style="color: #666;">Minimum 8 characters.</small>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" minlength="8" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="button primary">Update Password</button>
                <a href="{{ url_for('admin.dashboard') }}" class="button btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
